<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        .checkout-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 3rem;
            align-items: start;
        }

        .checkout-panel {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .checkout-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            font-family: 'Outfit', sans-serif;
        }

        .step-number {
            background: rgba(112, 0, 255, 0.2);
            color: var(--accent-cyan);
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            border: 1px solid var(--accent-purple);
            box-shadow: 0 0 15px rgba(112, 0, 255, 0.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .checkout-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 1rem;
        }

        .checkout-item-img {
            width: 60px; height: 60px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid var(--glass-highlight);
        }

        .summary-block {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .summary-block.total {
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            border-top: 1px solid var(--glass-border);
            padding-top: 1.5rem;
            margin-top: 1rem;
        }

        @media (max-width: 900px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar" style="padding: 1rem 4rem; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.02)">
        <a href="index.html" class="nav-brand" style="font-size: 1.8rem;">NEXUS <span style="font-size:0.8rem; letter-spacing: 0; color:var(--text-muted); text-shadow:none;">Secure Checkout</span></a>
    </nav>

    <main class="container" style="padding-top: 3rem;">
        <div class="checkout-grid">
            
            <!-- Left Side: Forms -->
            <div class="checkout-panel">
                <div class="step-header">
                    <div class="step-number">1</div>
                    <h2>Shipping Details</h2>
                </div>
                
                <form id="checkoutForm">
                    <div class="form-grid">
                        <div class="form-group full">
                            <label class="form-label">Full Name</label>
                            <input type="text" id="name" class="form-control" placeholder="Jane Doe" required>
                        </div>
                        <div class="form-group full">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="email" class="form-control" placeholder="jane@cyberdyne.sys" required>
                        </div>
                        <div class="form-group full">
                            <label class="form-label">Delivery Address</label>
                            <textarea id="address" class="form-control" rows="3" placeholder="Enter your full street address..." required></textarea>
                        </div>
                    </div>
                </form>

                <div class="step-header" style="margin-top: 3rem;">
                    <div class="step-number">2</div>
                    <h2>Payment Method</h2>
                </div>
                
                <div style="background: rgba(0,0,0,0.3); border: 1px solid var(--accent-purple); padding: 1.5rem; border-radius: 16px; display: flex; gap: 1rem; align-items: center;">
                    <div style="width: 24px; height: 24px; border-radius: 50%; background: var(--accent-cyan); display: flex; align-items:center; justify-content:center; box-shadow: 0 0 10px var(--accent-cyan);">
                        <div style="width:10px; height:10px; background:#000; border-radius:50%;"></div>
                    </div>
                    <div>
                        <strong style="display:block; font-size:1.1rem;">Razorpay Secure</strong>
                        <span style="color:var(--text-muted); font-size:0.9rem;">Credit Card, UPI, NetBanking</span>
                    </div>
                </div>
            </div>

            <!-- Right Side: Order Summary -->
            <div class="checkout-panel" style="position: sticky; top: 100px;">
                <h3 style="font-family: 'Outfit'; font-size: 1.8rem; margin-bottom: 2rem;">Order Summary</h3>
                
                <div id="checkoutItemsList" style="max-height: 300px; overflow-y: auto; padding-right: 1rem; margin-bottom: 2rem;">
                    <!-- Items populated via JS -->
                </div>

                <div class="summary-block">
                    <span>Subtotal</span>
                    <span id="subtotalDisplay">$0.00</span>
                </div>
                <div class="summary-block">
                    <span>Digital Taxes (Included)</span>
                    <span style="color: var(--accent-cyan);">$0.00</span>
                </div>
                
                <div class="summary-block total">
                    <span>Total</span>
                    <span id="checkoutTotalAmount">$0.00</span>
                </div>

                <button id="payButton" class="btn btn-primary" style="width: 100%; margin-top: 2rem; padding: 1.2rem; font-size: 1.2rem;">
                    Pay & Complete Order
                </button>
                <div style="text-align:center; margin-top: 1rem; color: var(--text-muted); font-size: 0.85rem;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
                    256-bit SSL Encrypted Transaction
                </div>
            </div>

        </div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
    <script src="js/payment.js"></script>
    <script>
        let totalAmountValue = 0;
        
        document.addEventListener('DOMContentLoaded', () => {
            const cart = window.App.AppState.cart;
            
            if (cart.length === 0) {
                alert("Your cart is empty. Redirecting to shop.");
                window.location.href = 'index.html';
                return;
            }

            // Populate items summary
            const itemsList = document.getElementById('checkoutItemsList');
            itemsList.innerHTML = cart.map(item => `
                <div class="checkout-item">
                    <img src="${item.image_url}" class="checkout-item-img">
                    <div style="flex: 1;">
                        <span style="display:block; font-weight: 600;">${item.name}</span>
                        <span style="color: var(--text-muted); font-size:0.9rem;">Qty: ${item.quantity}</span>
                    </div>
                    <span style="font-weight: 700;">${window.App.formatCurrency(item.price * item.quantity)}</span>
                </div>
            `).join('');
            
            totalAmountValue = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const totalStr = window.App.formatCurrency(totalAmountValue);
            
            document.getElementById('subtotalDisplay').textContent = totalStr;
            document.getElementById('checkoutTotalAmount').textContent = totalStr;
            
            document.getElementById('payButton').addEventListener('click', async () => {
                const form = document.getElementById('checkoutForm');
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }
                
                const customerDetails = {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    address: document.getElementById('address').value
                };
                
                // Initialize Razorpay flow
                await handlePayment(totalAmountValue, customerDetails, cart);
            });
        });
    </script>
</body>
</html>
