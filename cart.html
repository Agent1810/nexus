<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .cart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 3rem;
            align-items: start;
            margin-top: 2rem;
        }

        .cart-items-container {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 2rem;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--glass-border);
            transition: all 0.3s;
        }

        .cart-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .cart-item:hover {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding-left: 1rem;
        }

        .cart-item-img {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            object-fit: cover;
            border: 1px solid var(--accent-purple);
            box-shadow: 0 0 15px rgba(112, 0, 255, 0.2);
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            color: var(--accent-cyan);
            font-weight: 800;
            font-size: 1.1rem;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 0.25rem 0.5rem;
        }

        .qty-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .qty-btn:hover {
            background: var(--accent-purple);
            color: white;
            box-shadow: 0 0 10px var(--accent-purple);
        }

        .cart-summary {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            position: sticky;
            top: 100px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
            font-weight: 800;
            font-size: 1.8rem;
            color: white;
        }

        @media (max-width: 900px) {
            .cart-grid { grid-template-columns: 1fr; }
            .cart-item { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">NEXUS</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Shop</a>
        </div>
    </nav>

    <main class="container">
        <h1 style="font-family: 'Outfit'; font-size: 3rem; margin-bottom: 1rem;"><span style="color: var(--accent-cyan)">Shopping</span> Cart</h1>
        
        <div class="cart-grid">
            <div class="cart-items-container" id="cartItemsContainer">
                <!-- Cart items loaded here -->
            </div>
            
            <div class="cart-summary">
                <h3 style="font-family: 'Outfit'; font-size: 1.8rem; margin-bottom: 2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;">Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotalAmount" style="color: white; font-weight: 600;">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span style="color: var(--accent-cyan);">Free Secure Delivery</span>
                </div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="totalAmount" style="text-shadow: 0 0 15px rgba(255,255,255,0.4)">$0.00</span>
                </div>
                
                <a href="checkout.html" class="btn btn-primary" style="width: 100%; margin-top: 2.5rem; padding: 1.2rem; font-size: 1.2rem;">PROCEED TO CHECKOUT</a>
                <p style="text-align:center; color: var(--text-muted); font-size: 0.85rem; margin-top: 1.5rem;">Taxes calculated at checkout step.</p>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
    <script>
        const renderCart = () => {
            const container = document.getElementById('cartItemsContainer');
            const cart = window.App.AppState.cart;
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 4rem;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" style="margin-bottom:1rem;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                        <h2 style="font-family:'Outfit'; color: white; margin-bottom: 1rem;">Your cart is empty</h2>
                        <a href="index.html" class="btn btn-primary">Return to Shop</a>
                    </div>
                `;
                updateSummary();
                return;
            }

            container.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <img src="${item.image_url}" alt="${item.name}" class="cart-item-img">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-price">${window.App.formatCurrency(item.price)}</div>
                    </div>
                    <div class="qty-control">
                        <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                        <span style="min-width: 30px; text-align: center; font-weight: 700; font-size: 1.2rem;">${item.quantity}</span>
                        <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                    </div>
                    <button class="btn btn-outline" style="padding: 0.75rem; border-color: transparent; border-radius: 50%;" title="Remove" onclick="removeItem(${index})">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-pink)" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>
                    </button>
                </div>
            `).join('');
            
            updateSummary();
        };

        const updateSummary = () => {
            const cart = window.App.AppState.cart;
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            document.getElementById('subtotalAmount').textContent = window.App.formatCurrency(subtotal);
            document.getElementById('totalAmount').textContent = window.App.formatCurrency(subtotal);
        };

        window.updateQty = (index, delta) => {
            const cart = window.App.AppState.cart;
            const item = cart[index];
            item.quantity += delta;
            
            if (item.quantity <= 0) {
                cart.splice(index, 1);
            }
            
            window.App.saveCart();
            renderCart();
        };

        window.removeItem = (index) => {
            window.App.AppState.cart.splice(index, 1);
            window.App.saveCart();
            renderCart();
        };

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
