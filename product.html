<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">NEXUS</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Shop</a>
            <a href="cart.html" class="cart-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="cart-badge" id="cart-count" style="display: none;">0</span>
            </a>
        </div>
    </nav>

    <main class="container">
        <div id="product-detail-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; margin-top: 2rem; align-items: start;">
            <!-- Rendered via JS -->
            <div style="color: var(--text-secondary)">Loading...</div>
        </div>
    </main>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check url for ID (mocking it if none provided just to show the layout)
            const urlParams = new URLSearchParams(window.location.search);
            let productId = urlParams.get('id') || 'p1';

            const { data: products } = await window.supabase.from('products').select('*');
            const product = products.find(p => p.id === productId);

            const container = document.getElementById('product-detail-container');
            
            if (!product) {
                container.innerHTML = '<h2 style="color: var(--error)">Product not found</h2>';
                return;
            }

            container.innerHTML = `
                <div style="background: var(--bg-secondary); border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color);">
                    <img src="${product.image_url}" alt="${product.name}" style="width: 100%; height: auto; display: block;">
                </div>
                <div>
                    <span style="color: var(--accent-primary); font-weight: 700; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 0.05em">${product.category}</span>
                    <h1 style="font-size: 2.5rem; margin: 0.5rem 0 1.5rem;">${product.name}</h1>
                    <div style="font-size: 2rem; font-weight: 700; color: var(--text-primary); margin-bottom: 2rem;">
                        ${window.App.formatCurrency(product.price)}
                    </div>
                    <p style="color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem;">${product.description}</p>
                    
                    <div style="margin-bottom: 1.5rem; color: var(--text-secondary);">
                        <strong style="color: var(--text-primary);">Stock:</strong> ${product.stock} units available
                    </div>
                    
                    <button class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;" onclick='window.App.addToCart(${JSON.stringify(product).replace(/'/g, "&apos;")})'>
                        Add to Cart
                    </button>
                </div>
            `;
        });
    </script>
</body>
</html>
